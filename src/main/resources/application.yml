spring:
  application:
    name: edu-tool
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/eduTool}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:12345}
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
    defer-datasource-initialization: true
  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.yaml
    enabled: true
    drop-first: false
    default-schema: public
  sql:
    init:
      mode: never
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${EMAIL_USERNAME:web8386@gmail.com}
    password: ${EMAIL_PASSWORD:nmgljodryrfqmppu}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
        debug: true

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}
  error:
    include-stacktrace: never
    include-message: always

logging:
  level:
    org.springframework.security: INFO
    liquibase: INFO

jwt:
  secret: ${JWT_SECRET:very-very-super-secret-key-at-least-32-characters-long}
  access-token-expiration: 604800000

app:
  cookie:
    secure: ${APP_COOKIE_SECURE:false}
    same-site: ${APP_COOKIE_SAME_SITE:Lax}
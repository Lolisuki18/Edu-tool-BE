databaseChangeLog:
  - changeSet:
      id: 18
      author: edutool
      comment: Add soft delete flags for students and lecturers
      changes:
        - addColumn:
            tableName: students
            columns:
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  remarks: Soft delete flag for student
                  constraints:
                    nullable: false
        - addColumn:
            tableName: lecturers
            columns:
              - column:
                  name: is_deleted
                  type: BOOLEAN
                  defaultValueBoolean: false
                  remarks: Soft delete flag for lecturer
                  constraints:
                    nullable: false
        - createIndex:
            indexName: idx_students_is_deleted
            tableName: students
            columns:
              - column:
                  name: is_deleted
        - createIndex:
            indexName: idx_lecturers_is_deleted
            tableName: lecturers
            columns:
              - column:
                  name: is_deleted
      rollback:
        - dropIndex:
            indexName: idx_students_is_deleted
            tableName: students
        - dropIndex:
            indexName: idx_lecturers_is_deleted
            tableName: lecturers
        - dropColumn:
            tableName: students
            columnName: is_deleted
        - dropColumn:
            tableName: lecturers
            columnName: is_deleted